<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClimbAR Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">ClimbAR Admin</p>
          <h1>Guidebook Tools</h1>
        </div>
        <form id="api-form" class="api-form">
          <label for="api-base-url">API base URL</label>
          <div class="api-controls">
            <input
              id="api-base-url"
              name="api-base-url"
              type="url"
              value="http://127.0.0.1:8080/api/v1"
              required
            />
            <button type="submit">Load</button>
          </div>
        </form>
        <form id="auth-form" class="api-form">
          <label for="admin-email">Admin email</label>
          <input id="admin-email" type="email" value="admin@example.com" required />
          <label for="admin-password">Password</label>
          <input id="admin-password" type="password" value="dev-password" required />
          <button type="submit">Sign in</button>
        </form>
      </header>

      <nav class="tabs" aria-label="Admin sections">
        <button class="tab-button" type="button" data-view="guidebook" aria-selected="true">
          Guidebook Editor
        </button>
        <button class="tab-button" type="button" data-view="calibration" aria-selected="false">
          Calibration Review
        </button>
      </nav>

      <section class="filters" aria-label="Admin filters and actions">
        <div class="filter-group guidebook-only">
          <button id="create-area-button" type="button">New Area</button>
          <button id="create-wall-button" type="button">New Wall</button>
          <button id="create-route-button" type="button">New Route</button>
          <button id="create-overlay-button" type="button">New Overlay</button>
          <button id="publish-pack-button" type="button">Publish Offline Pack</button>
        </div>
        <div class="filter-group calibration-only">
          <label>
            Route ID
            <input id="route-filter" type="text" placeholder="Optional route UUID" />
          </label>
          <label>
            Overlay ID
            <input id="overlay-filter" type="text" placeholder="Optional overlay UUID" />
          </label>
        </div>
        <button id="refresh-button" type="button">Refresh</button>
      </section>

      <section class="status-strip" aria-live="polite">
        <span id="status-text">Ready to load calibration captures.</span>
      </section>

      <section id="guidebook-view" class="layout">
        <aside class="capture-list" aria-label="Guidebook routes">
          <div class="list-heading">
            <h2>Routes</h2>
            <span id="route-count">0</span>
          </div>
          <div id="route-list" class="list-items"></div>
        </aside>

        <section id="route-editor" class="detail-panel" aria-label="Selected route editor">
          <div class="empty-state">
            <h2>No route selected</h2>
            <p>Load guidebook data, then select a route to edit route and overlay fields.</p>
          </div>
        </section>
      </section>

      <section id="calibration-view" class="layout hidden">
        <aside class="capture-list" aria-label="Calibration captures">
          <div class="list-heading">
            <h2>Captures</h2>
            <span id="capture-count">0</span>
          </div>
          <div id="capture-list" class="list-items"></div>
        </aside>

        <section id="capture-detail" class="detail-panel" aria-label="Selected capture">
          <div class="empty-state">
            <h2>No capture selected</h2>
            <p>Load calibration captures, then select one to review or apply to an overlay.</p>
          </div>
        </section>
      </section>
    </main>

    <template id="capture-row-template">
      <button class="capture-row" type="button">
        <span class="route-name"></span>
        <span class="capture-meta"></span>
        <span class="review-status"></span>
      </button>
    </template>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
