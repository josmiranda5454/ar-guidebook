services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: climbar
      POSTGRES_USER: climbar
      POSTGRES_PASSWORD: climbar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climbar -d climbar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:

