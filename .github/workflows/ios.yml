name: iOS CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  simulator-build:
    name: Build iOS simulator target
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build without signing
        run: >-
          xcodebuild
          -project ios/ClimbAR.xcodeproj
          -scheme ClimbAR
          -sdk iphonesimulator
          -configuration Debug
          -derivedDataPath "$RUNNER_TEMP/ClimbARDerivedData"
          CODE_SIGNING_ALLOWED=NO
          build
